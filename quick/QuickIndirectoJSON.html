<!DOCTYPE html>
<html>
<head>
<title>QuickSort Indirecto JSON</title>
</head>
<body>

<h2>Ordenamiento Indirecto JSON</h2>

<button onclick="procesarJSON()">
Procesar JSON
</button>

<h3 id="salida"></h3>

<script>

const datosJSON = {

    numeros:[40,10,60,20,50]

};

function procesarJSON(){

    let datos =
    datosJSON.numeros;

    let indices =
    datos.map((v,i)=>i);

    indices.sort(
    (a,b)=>datos[a]-datos[b]
    );

    let ordenado =
    indices.map(i=>datos[i]);

    document.getElementById("salida").innerHTML =
    "Original: "
    + datos.join(" ")
    + "<br><br>Indices: "
    + indices.join(" ")
    + "<br><br>Indirecto: "
    + ordenado.join(" ");
}

</script>

</body>
</html>
