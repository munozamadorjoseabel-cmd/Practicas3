<!DOCTYPE html>
<html>
<head>
<title>Pila JSON</title>
</head>
<body>

<h2>Pila cargada desde JSON</h2>

<button onclick="mostrarJSON()">
Mostrar JSON
</button>

<h3 id="salida"></h3>

<script>

const datos = {
    pila:[10,20,30]
};

function mostrarJSON(){

    document.getElementById("salida").innerHTML =
    "Pila: " +
    datos.pila.slice().reverse().join(" | ");
}

</script>

</body>
</html>
